<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이미지와 피규어</title>
  </head>
  <body>
    <h1>이미지와 피규어</h1>
    <!-- 의미없는 장식 이미지 -->
    <p>
      <img src="./../assets/images/tree.png" alt="" />
    </p>
    <!-- 의미를 가지는 이미지 -->
    <p>
      <img src="./../assets/svg/chitchat.svg" alt="1대 1 대화" width="50" height="50" />
    </p>
    <figure>
      <img src="./../assets/svg/chitchat.svg" alt="" width="50" height="50" />
      <figcaption>채팅</figcaption>
    </figure>
  </body>
</html>
