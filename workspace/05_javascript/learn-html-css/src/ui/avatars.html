<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아바타 UI</title>
  </head>
  <body>
    <h1>아바타 UI</h1>
    <h2>인터렉션이 없는 경우</h2>
    <figure>
      <img src="./../assets/face/face1.jpg" alt="" />
      <figcaption>
        <span class="a11y-hidden">슬비님</span>
        <span class="a11y-hidden state-offline">오프라인</span>
        <span class="circle"></span>
      </figcaption>
    </figure>
    <h2>인터렉션이 있는 경우</h2>
    <a href="" aria-label="슬비님 오프라인" role="button">
      <img src="./../assets/face/face2.jpg" alt="" />
      <span class="circle"></span>
    </a>
  </body>
</html>
