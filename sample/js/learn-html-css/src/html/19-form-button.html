  <body>
    <h1>폼 (button) 요소</h1>
    <form action="서버 URL" method="post">
      <div>
        <label>
          이름
          <input type="text" />
        </label>
      </div>

      <!-- input 요소로 만드는 버튼 -->
      <input type="reset" value="초기화" />
      <input type="button" value="저장" />
      <input type="submit" value="전송" />
      <hr />
      <button type="reset">초기화</button>
      <button type="button`">저장</button>
      <button type="submit">전송</button>
    </form>
  </body>
